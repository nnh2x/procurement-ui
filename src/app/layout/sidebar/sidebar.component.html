<aside class="sidebar">
  <div class="sidebar-top">
    <a routerLink="/" class="sidebar-back">
      <span nz-icon nzType="arrow-left"></span>
      <span>Tất cả modules</span>
    </a>
  </div>

  @if (serviceNav; as nav) {
    <div class="sidebar-service">
      <div class="sidebar-service-icon" [style.background]="nav.color + '18'" [style.border-color]="nav.color + '30'">
        <span nz-icon [nzType]="nav.icon" nzTheme="outline" [style.color]="nav.color"></span>
      </div>
      <div class="sidebar-service-info">
        <span class="sidebar-service-name">{{ nav.label }}</span>
        <span class="sidebar-service-sub">Module</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <span class="sidebar-nav-label">Menu</span>
      @for (item of menuItems; track item.path) {
        <a
          class="sidebar-nav-item"
          [routerLink]="item.path"
          routerLinkActive="sidebar-nav-item--active"
        >
          <span class="nav-item-icon" nz-icon [nzType]="item.icon"></span>
          <span class="nav-item-label">{{ item.label }}</span>
        </a>
      }
    </nav>
  }
</aside>
