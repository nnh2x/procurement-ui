<aside class="sidebar" [class.sidebar--collapsed]="collapsed">

  <!-- Logo -->
  <a routerLink="/" class="sidebar-logo">
    <div class="sidebar-logo-mark">
      <span nz-icon nzType="appstore" nzTheme="fill"></span>
    </div>
    <span class="sidebar-logo-name">NexusERP</span>
  </a>

  @if (serviceNav; as nav) {
    <!-- Module badge -->
    <div class="sidebar-module" [nz-tooltip]="collapsed ? nav.label : ''" nzTooltipPlacement="right">
      <div class="sidebar-module-icon" [style.background]="nav.color + '18'" [style.border-color]="nav.color + '30'">
        <span nz-icon [nzType]="nav.icon" nzTheme="outline" [style.color]="nav.color"></span>
      </div>
      <div class="sidebar-module-info">
        <span class="sidebar-module-name">{{ nav.label }}</span>
        <span class="sidebar-module-tag">Module</span>
      </div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <span class="sidebar-nav-label">Menu</span>
      @for (item of menuItems; track item.path) {
        <a
          class="sidebar-nav-item"
          [routerLink]="item.path"
          routerLinkActive="sidebar-nav-item--active"
          [nz-tooltip]="collapsed ? item.label : ''"
          nzTooltipPlacement="right"
        >
          <span class="nav-item-icon" nz-icon [nzType]="item.icon"></span>
          <span class="nav-item-label">{{ item.label }}</span>
        </a>
      }
    </nav>
  }

  <!-- Toggle + Back -->
  <div class="sidebar-bottom">
    <button class="sidebar-toggle" (click)="toggle()" [nz-tooltip]="collapsed ? 'Expand' : 'Collapse'" nzTooltipPlacement="right">
      <span nz-icon [nzType]="collapsed ? 'menu-unfold' : 'menu-fold'"></span>
    </button>
    <a routerLink="/" class="sidebar-back" [nz-tooltip]="collapsed ? 'All modules' : ''" nzTooltipPlacement="right">
      <span nz-icon nzType="arrow-left"></span>
      <span class="sidebar-back-label">All modules</span>
    </a>
  </div>

</aside>
